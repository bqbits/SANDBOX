apiVersion: v1
kind: Service
metadata:
  name: bensons-shop
  namespace: bensons-shop
  labels:
    app: bensons-shop
spec:
  type: ClusterIP
  selector:
    app: bensons-shop
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: None
---
