apiVersion: apps/v1
kind: Deployment
metadata:
  name: bensons-shop
  namespace: bensons-shop
  labels:
    app: bensons-shop
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bensons-shop
  template:
    metadata:
      labels:
        app: bensons-shop
        version: v1.0.0
      annotations:
        # Datadog Admission Controller auto-injects these, but we'll be explicit
        ad.datadoghq.com/bensons-shop.logs: '[{"source":"python","service":"bensons-potion-shop"}]'
    spec:
      containers:
      - name: bensons-shop
        image: bensons-potion-shop-flask:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP

        # Datadog Environment Variables from ConfigMap
        envFrom:
        - configMapRef:
            name: bensons-shop-config

        # Datadog API Key from Secret (optional - only if using standalone mode)
        # env:
        # - name: DD_API_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: datadog-secret
        #       key: api-key

        # Resource limits
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Liveness probe - check if app is responsive
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe - check if app is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        # Startup probe - check if app has started
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
