apiVersion: apps/v1
kind: Deployment
metadata:
  name: potion-shop-gin-k8s
  labels:
    app: potion-shop-gin-k8s
spec:
  replicas: 2
  selector:
    matchLabels:
      app: potion-shop-gin-k8s
  template:
    metadata:
      labels:
        app: potion-shop-gin-k8s
    spec:
      containers:
      - name: potion-shop
        image: potion-shop-gin-k8s:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: GIN_MODE
          value: "release"
        - name: PORT
          value: "8080"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
