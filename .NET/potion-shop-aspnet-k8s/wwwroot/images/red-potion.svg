<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Bottle body -->
  <ellipse cx="60" cy="85" rx="35" ry="30" fill="#8b0000"/>
  <ellipse cx="60" cy="85" rx="30" ry="25" fill="#dc143c"/>
  <ellipse cx="60" cy="82" rx="25" ry="20" fill="#ff0000" opacity="0.8"/>

  <!-- Bottle neck -->
  <rect x="50" y="30" width="20" height="40" fill="#654321"/>
  <rect x="52" y="32" width="16" height="36" fill="#8b4513"/>

  <!-- Cork -->
  <ellipse cx="60" cy="30" rx="12" ry="6" fill="#8b4513"/>
  <ellipse cx="60" cy="27" rx="12" ry="5" fill="#a0522d"/>
  <rect x="48" y="20" width="24" height="8" fill="#a0522d" rx="2"/>

  <!-- Shine effect -->
  <ellipse cx="48" cy="75" rx="12" ry="18" fill="white" opacity="0.3"/>
  <ellipse cx="45" cy="70" rx="6" ry="10" fill="white" opacity="0.5"/>

  <!-- Label -->
  <rect x="45" y="85" width="30" height="15" fill="#f0e68c" opacity="0.8" rx="2"/>
  <text x="60" y="96" font-family="Arial" font-size="8" fill="#8b0000" text-anchor="middle" font-weight="bold">RED</text>

  <!-- Hearts floating around -->
  <text x="15" y="40" font-size="16" fill="#ff0000" opacity="0.6">❤</text>
  <text x="95" y="45" font-size="14" fill="#ff0000" opacity="0.7">❤</text>
  <text x="20" y="100" font-size="12" fill="#ff0000" opacity="0.5">❤</text>
  <text x="90" y="95" font-size="15" fill="#ff0000" opacity="0.6">❤</text>
</svg>
