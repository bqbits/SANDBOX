apiVersion: apps/v1
kind: Deployment
metadata:
  name: potion-shop-aspnet-k8s-dotnet
  labels:
    app: potion-shop-aspnet-k8s-dotnet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: potion-shop-aspnet-k8s-dotnet
  template:
    metadata:
      labels:
        app: potion-shop-aspnet-k8s-dotnet
    spec:
      containers:
      - name: potion-shop
        image: potion-shop-aspnet-k8s-dotnet:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:5000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
